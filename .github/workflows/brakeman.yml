name: Brakeman Security Scan

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  brakeman:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        id: brakeman
        run: bin/brakeman --no-pager -o brakeman-report.html -o brakeman-report.json -o brakeman-report.md -o brakeman-report.sarif
        continue-on-error: true

      - name: Upload Brakeman SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: brakeman-report.sarif

      - name: Upload Brakeman reports as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: brakeman-reports
          path: |
            brakeman-report.html
            brakeman-report.json
            brakeman-report.md

      - name: Create GitHub Issues for Brakeman warnings
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "brakeman" --color "e4e669" --description "Brakeman security finding" 2>/dev/null || true
          gh label create "security" --color "d73a4a" --description "Security vulnerability" 2>/dev/null || true

          if [ ! -f brakeman-report.json ]; then
            echo "No brakeman report found, skipping issue creation"
            exit 0
          fi

          warnings=$(jq '.warnings | length' brakeman-report.json)
          echo "Found $warnings Brakeman warning(s)"

          if [ "$warnings" -eq "0" ]; then
            echo "No warnings to report"
            exit 0
          fi

          for i in $(seq 0 $((warnings - 1))); do
            fingerprint=$(jq -r ".warnings[$i].fingerprint" brakeman-report.json)
            warning_type=$(jq -r ".warnings[$i].warning_type" brakeman-report.json)
            message=$(jq -r ".warnings[$i].message" brakeman-report.json)
            file=$(jq -r ".warnings[$i].file" brakeman-report.json)
            line=$(jq -r ".warnings[$i].line" brakeman-report.json)
            confidence=$(jq -r ".warnings[$i].confidence" brakeman-report.json)
            link=$(jq -r ".warnings[$i].link" brakeman-report.json)
            code=$(jq -r ".warnings[$i].code" brakeman-report.json)

            existing=$(gh issue list --state open --search "$fingerprint in:body" --json number --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              echo "Issue #$existing already exists for fingerprint $fingerprint, skipping"
              continue
            fi

            gh issue create \
              --title "[Brakeman] $warning_type in $file" \
              --label "brakeman,security" \
              --body "## Brakeman Security Warning

          **Type:** $warning_type
          **File:** \`$file\`
          **Line:** $line
          **Confidence:** $confidence
          **Message:** $message
          **Code:** \`$code\`
          **More Info:** $link

          ---
          *Fingerprint: $fingerprint*
          *Found by [Brakeman](https://brakemanscanner.org/) in CI run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
            echo "Created issue for fingerprint $fingerprint"
          done

      - name: Fail if Brakeman found warnings
        if: steps.brakeman.outcome == 'failure'
        run: exit 1

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit
