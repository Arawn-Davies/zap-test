name: ZAP Nightly Authenticated Scan

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  zap_authenticated_scan:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y default-libmysqlclient-dev libvips

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up database
        env:
          RAILS_ENV: development
          DATABASE_URL: mysql2://127.0.0.1:3306
        run: bin/rails db:create db:migrate db:seed

      - name: Start Rails server
        env:
          RAILS_ENV: development
          DATABASE_URL: mysql2://127.0.0.1:3306
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE || 'a_dummy_secret_key_base_for_zap_nightly_scan_only' }}
        run: |
          bin/rails server -p 3000 &
          echo "Waiting for Rails to start..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/up > /dev/null && echo "Rails is up" && break
            sleep 2
          done
          curl -sf http://localhost:3000/up > /dev/null || { echo "Rails failed to start within 60 seconds"; exit 1; }

      - name: Prepare ZAP context file
        env:
          # Credentials match the admin user created in db/seeds.rb (username: admin, password: admin).
          # Override by setting ZAP_USERNAME and ZAP_PASSWORD repository secrets.
          ZAP_USERNAME: ${{ secrets.ZAP_USERNAME || 'admin' }}
          ZAP_PASSWORD: ${{ secrets.ZAP_PASSWORD || 'admin' }}
        run: |
          sed \
            -e "s/REPLACE_USERNAME/${ZAP_USERNAME}/g" \
            -e "s/REPLACE_PASSWORD/${ZAP_PASSWORD}/g" \
            .github/zap/auth.context > .github/zap/runtime-auth.context

      - name: ZAP Authenticated Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:3000'
          context_file: '.github/zap/runtime-auth.context'
          fail_action: false
          allow_issue_writing: true
          artifact_name: 'zap-nightly-report'
