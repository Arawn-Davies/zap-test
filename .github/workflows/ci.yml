name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        id: brakeman
        run: bin/brakeman --no-pager -o brakeman-report.html -o brakeman-report.json -o brakeman-report.md -o brakeman-report.sarif
        continue-on-error: true

      - name: Upload Brakeman SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: brakeman-report.sarif

      - name: Upload Brakeman reports as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: brakeman-reports
          path: |
            brakeman-report.html
            brakeman-report.json
            brakeman-report.md

      - name: Create GitHub Issues for Brakeman warnings
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "brakeman" --color "e4e669" --description "Brakeman security finding" 2>/dev/null || true
          gh label create "security" --color "d73a4a" --description "Security vulnerability" 2>/dev/null || true

          if [ ! -f brakeman-report.json ]; then
            echo "No brakeman report found, skipping issue creation"
            exit 0
          fi

          warnings=$(jq '.warnings | length' brakeman-report.json)
          echo "Found $warnings Brakeman warning(s)"

          if [ "$warnings" -eq "0" ]; then
            echo "No warnings to report"
            exit 0
          fi

          for i in $(seq 0 $((warnings - 1))); do
            fingerprint=$(jq -r ".warnings[$i].fingerprint" brakeman-report.json)
            warning_type=$(jq -r ".warnings[$i].warning_type" brakeman-report.json)
            message=$(jq -r ".warnings[$i].message" brakeman-report.json)
            file=$(jq -r ".warnings[$i].file" brakeman-report.json)
            line=$(jq -r ".warnings[$i].line" brakeman-report.json)
            confidence=$(jq -r ".warnings[$i].confidence" brakeman-report.json)
            link=$(jq -r ".warnings[$i].link" brakeman-report.json)
            code=$(jq -r ".warnings[$i].code" brakeman-report.json)

            existing=$(gh issue list --state open --search "$fingerprint in:body" --json number --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              echo "Issue #$existing already exists for fingerprint $fingerprint, skipping"
              continue
            fi

            gh issue create \
              --title "[Brakeman] $warning_type in $file" \
              --label "brakeman,security" \
              --body "## Brakeman Security Warning

          **Type:** $warning_type
          **File:** \`$file\`
          **Line:** $line
          **Confidence:** $confidence
          **Message:** $message
          **Code:** \`$code\`
          **More Info:** $link

          ---
          *Fingerprint: $fingerprint*
          *Found by [Brakeman](https://brakemanscanner.org/) in CI run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
            echo "Created issue for fingerprint $fingerprint"
          done

      - name: Fail if Brakeman found warnings
        if: steps.brakeman.outcome == 'failure'
        run: exit 1

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD || 'ci_password' }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: valkey/valkey:8
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y default-libmysqlclient-dev libvips

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'ci_password' }}
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test

  system-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD || 'ci_password' }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: valkey/valkey:8
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y default-libmysqlclient-dev libvips

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run System Tests
        env:
          RAILS_ENV: test
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'ci_password' }}
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
